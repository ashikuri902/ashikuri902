<title>Panel 22 – Premium Offers</title>
<style>
:root{
  --bg:#060405;
  --wine:#2a0d14;
  --panel:#12080b;
  --row:#1a0e12;
  --row-hover:#241218;
  --gold-soft:#d6b36a;
  --gold-muted:#bfa25a;
  --gold-dark:#8f7538;
  --text:#f4efe7;
  --muted:#c9bfb4;
  --border:rgba(214,179,106,.25);
}
*{box-sizing:border-box;font-family:Inter,system-ui,sans-serif}
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,var(--wine),var(--bg));
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text);
}
.panel{
  width:440px;
  max-width:94vw;
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.25));
  border:1px solid var(--border);
  border-radius:28px;
  padding:28px 26px 30px;
  box-shadow:0 60px 180px rgba(0,0,0,.9);
}
.panel h2{
  text-align:center;
  margin:4px 0 22px;
  font-size:22px;
  letter-spacing:3px;
  color:var(--gold-soft);
}
/* TOP BUTTONS (LINK SAFE) */
.top-btn{
  display:block;            /* FIX */
  width:100%;
  padding:14px;
  border-radius:16px;
  margin-bottom:14px;
  font-weight:700;
  letter-spacing:.6px;
  cursor:pointer;
  text-align:center;        /* FIX */
  text-decoration:none;     /* FIX */
}
.top-btn.primary{
  background:linear-gradient(180deg,var(--gold-soft),var(--gold-dark));
  color:#2a1f00;
}
.top-btn.secondary{
  background:linear-gradient(180deg,#3a111b,#240a11);
  color:var(--gold-soft);
}
/* OFFER LIST */
.list{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  max-height:520px;
  overflow-y:auto;
  padding-right:4px;
  opacity:0;
  transform:translateY(18px);
  animation:listReveal .7s ease forwards .25s;
}
@keyframes listReveal{to{opacity:1;transform:none}}
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-thumb{background:rgba(214,179,106,.35);border-radius:10px}
/* OFFER ITEM */
.item{
  background:linear-gradient(180deg,var(--row),#14090d);
  border:1px solid rgba(214,179,106,.18);
  border-radius:16px;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
  text-decoration:none;
  color:var(--text);
  transition:.2s ease;
  opacity:0;
  transform:translateY(10px);
  animation:offerReveal .55s ease forwards;
}
.item:nth-child(1){animation-delay:.45s}
.item:nth-child(2){animation-delay:.55s}
.item:nth-child(3){animation-delay:.65s}
.item:nth-child(4){animation-delay:.75s}
.item:nth-child(5){animation-delay:.85s}
.item:nth-child(6){animation-delay:.95s}
.item:nth-child(7){animation-delay:1.05s}
.item:nth-child(8){animation-delay:1.15s}
.item:nth-child(9){animation-delay:1.25s}
.item:nth-child(10){animation-delay:1.35s}
.item:nth-child(11){animation-delay:1.45s}
.item:nth-child(12){animation-delay:1.55s}
.item:nth-child(13){animation-delay:1.65s}
.item:nth-child(14){animation-delay:1.75s}
.item:nth-child(15){animation-delay:1.85s}
@keyframes offerReveal{to{opacity:1;transform:none}}
.item:hover{
  background:linear-gradient(180deg,var(--row-hover),#170b10);
  transform:translateX(4px);
}
.item span{color:var(--muted)}
.badge{
  min-width:70px;
  text-align:center;
  font-size:11.5px;
  font-weight:800;
  padding:6px 12px;
  border-radius:20px;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold-muted));
  color:#2a1f00;
}
.badge.vip{background:linear-gradient(180deg,#e8c978,#b08a3c)}
.footer{
  margin-top:18px;
  text-align:center;
  font-size:11.5px;
  letter-spacing:.5px;
  color:var(--muted);
}
@media(max-width:420px){
  .panel{width:100%;padding:22px 18px 24px}
  .panel h2{font-size:19px}
}
</style>
</head>
